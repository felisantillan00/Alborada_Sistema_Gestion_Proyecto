<div class="modal fade show d-block" tabindex="-1" role="dialog" aria-modal="true">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="closed.emit()"></button>
      </div>

      <div class="modal-body" [formGroup]="form">
        @if (mode === 'delete') {
        <p class="mb-0">
          Seguro que deseas eliminar la compra
          <strong>{{ compra?.Id ?? '' }}</strong>?
        </p>
        } @else {
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">ID</label>
            <input class="form-control" type="text" formControlName="Id" [disabled]="mode === 'view'" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Proveedor</label>
            <input class="form-control" type="text" formControlName="NombreProveedor" [disabled]="mode === 'view'" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Precio Total</label>
            <input class="form-control" type="number" formControlName="PrecioTotal" [disabled]="mode === 'view'" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Fecha</label>
            <input class="form-control" type="text" formControlName="Fecha" [disabled]="mode === 'view'" />
          </div>
          <div class="col-12" formArrayName="Producto">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label mb-0">Producto</label>
              <button type="button" class="btn btn-sm btn-outline-primary" (click)="addProducto()" [disabled]="mode === 'view'">
                Agregar
              </button>
            </div>

            @for (producto of productoFormArray.controls; track $index) {
            <div class="row g-2 align-items-end mb-2" [formGroupName]="$index">
              <div class="col-md-4">
                <label class="form-label">Id</label>
                <input class="form-control" type="text" formControlName="Id" [disabled]="mode === 'view'" />
              </div>
              <div class="col-md-3">
                <label class="form-label">Cantidad</label>
                <input class="form-control" type="number" formControlName="Cantidad" [disabled]="mode === 'view'" />
              </div>
              <div class="col-md-3">
                <label class="form-label">{{ precioLabel }}</label>
                <input class="form-control" type="number" formControlName="PrecioCompra" [disabled]="mode === 'view'" />
              </div>
              <div class="col-md-2">
                <button type="button"
                        class="btn btn-outline-danger w-100"
                        (click)="removeProducto($index)"
                        [disabled]="mode === 'view' || productoFormArray.length === 1">
                  Quitar
                </button>
              </div>
            </div>
            }
          </div>
        </div>
        }
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" (click)="closed.emit()">Cancelar</button>

        @if (mode === 'create' || mode === 'edit') {
        <button type="button" class="btn btn-primary" (click)="submitted.emit(mode)">
          {{ mode === 'create' ? 'Crear' : 'Guardar' }}
        </button>
        }

        @if (mode === 'delete') {
        <button type="button" class="btn btn-danger" (click)="submitted.emit(mode)">Borrar</button>
        }
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade show"></div>
