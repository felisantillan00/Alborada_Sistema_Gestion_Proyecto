<section class="container-fluid py-3 px-2 px-md-3 mt-2">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">

    <h2 class="h3 mb-0 fw-bold text-dark">Reparaciones</h2>

    <div class="d-flex align-items-center gap-2 ms-auto">

      <!-- Buscador -->
      <input
        type="text"
        class="form-control"
        placeholder="Buscar reparación..."
        [value]="searchText"
        (input)="onSearchInput($event)"
      />

      <!-- Botón crear -->
      <button class="btn btn-success" (click)="onNewReparacion()">
        <i class="bi bi-plus-lg"></i>
      </button>

    </div>
  </div>

  <!-- GRID -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0 p-md-3">

      <ag-grid-angular
        style="width: 100%; height: 60vh"
        class="ag-theme-alpine"
        [rowData]="reparaciones"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [pagination]="true"
        [paginationPageSize]="10"
        (gridReady)="onGridReady($event)"
        (rowClicked)="onRowClicked($event)"
      >
      </ag-grid-angular>

    </div>
  </div>

</section>
