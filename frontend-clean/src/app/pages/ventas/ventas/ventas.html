<section class="container-fluid py-3 px-2 px-md-3 mt-2">
  <section class="container-fluid py-3 px-2 px-md-3 mt-2">

    <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">

      <h2 class="h3 mb-0  fw-bold text-dark" style="letter-spacing: -0.5px;">Ventas</h2>

      <div class="d-flex align-items-center gap-2 ms-auto">

        <!-- Buscador -->
        <div class="search-wrapper shadow-sm" [class.expanded]="isSearchExpanded">
          <input #searchInput type="text" class="form-control search-input" placeholder="Buscar venta..."
            [value]="searchText" (input)="onSearchInput($event)">

          <button class="btn search-icon-btn shadow-none" type="button" (click)="toggleSearch()">
            <i class="bi" [ngClass]="(isSearchExpanded && searchText) ? 'bi-x-lg' : 'bi-search'"></i>
          </button>
        </div>

        <!-- Filtro -->
        <div class="dropdown">
          <button
            class="btn btn-light rounded-pill shadow-sm px-3 py-2 d-flex align-items-center gap-2 border text-dark transition-all"
            type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-funnel"></i>
            <span class="d-none d-md-inline fw-medium">Filtros</span>
            <span *ngIf="currentFilter !== 'all'"
              class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
              <span class="visually-hidden">Filtro activo</span>
            </span>
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"
            style="border-radius:12px; min-width: 220px;">
            <li>
              <h6 class="dropdown-header text-success fw-bold">Ordenar por</h6>
            </li>
            <li><a class="dropdown-item py-2" href="javascript:void(0)" (click)="applySort('nombreCliente', 'asc')"><i
                  class="bi bi-sort-alpha-down me-2"></i>Nombre (A - Z)</a></li>
            <li><a class="dropdown-item py-2" href="javascript:void(0)" (click)="applySort('nombreCliente', 'desc')"><i
                  class="bi bi-sort-alpha-up me-2"></i>Nombre (Z - A)</a></li>


          </ul>
        </div>

        <button
          class="btn btn-outline-primary rounded-pill shadow-sm px-3 py-2 d-flex align-items-center gap-2 transition-all text-nowrap"
          type="button" (click)="cargarMas()" [disabled]="loadingVentas">
          <ng-container *ngIf="loadingVentas; else showIcon">
            <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
            <span role="status">Cargando...</span>
          </ng-container>
          <ng-template #showIcon>
            <i class="bi bi-arrow-clockwise"></i>
            <span class="d-none d-sm-inline fw-medium">Ver más</span>
          </ng-template>
        </button>

        <button
          class="btn btn-success rounded-pill shadown-sm px-3 py-2 d-flex aling-items-center gap-2 transition-all text-nowrap"
          type="button" (click)="onNewVenta()">

          <i class="bi bi-plus-lg"></i>
          <span class="d-none d-sm-inline fw-medium">Nueva Venta</span>

        </button>
      </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 16px">
    </div>
  </section>

  <!-- Tabla -->
  <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 16px">
    <div class="card-body p-0 p-md-3">

      <ag-grid-angular style="width: 100%; height: 60vh" min-height="400px" class="ag-theme-alpine border-0"
        [rowData]="ventas" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [getRowId]="getRowId"
        [pagination]="true" [paginationPageSize]="10" [animateRows]="true" [suppressCellFocus]="true"
        (gridReady)="onGridReady($event)" (rowClicked)="onRowClicked($event)">
      </ag-grid-angular>
    </div>
  </div>
</section>

@if (modalOpen) {
<app-modal-view-ventas [mode]="modalMode" [venta]="selectedVenta" (closed)="closeModal()"
  (submitted)="onModalSubmit($event)">
</app-modal-view-ventas>
}
