<div class="sidebar d-flex flex-column flex-shrink-0 p-3" 
     [ngClass]="{
        'collapsed': isCollapsed && !isMobile, 
        'mobile-sidebar': isMobile,
        'mobile-open': isMobile && mobileMenuOpen
     }">
  
  <div class="d-flex align-items-center justify-content-between mb-3 mb-md-0 w-100">
    <a routerLink="/" class="d-flex align-items-center text-white text-decoration-none brand-container" (click)="closeMobileMenu()">
      <div class="logo-icon me-3">
        <i class="bi bi-bicycle"></i>
      </div>
      <div class="brand-text" *ngIf="(!isCollapsed && !isMobile) || (isMobile && mobileMenuOpen)">
        <span class="fs-5 fw-bold d-block lh-1">Alborada</span>
        <span class="fs-5 fw-bold d-block lh-1">Bicicletería</span>
        <small class="text-muted-custom mt-1 d-block" style="font-size: 0.75rem;">Sistema de gestión</small>
      </div>
    </a>

    <button *ngIf="isMobile" class="btn btn-link text-white p-0 ms-auto text-decoration-none" (click)="toggleMobileMenu()">
      <i class="bi" [ngClass]="mobileMenuOpen ? 'bi-x-lg' : 'bi-list'" style="font-size: 2rem;"></i>
    </button>
  </div>

  <hr class="border-secondary my-4" *ngIf="!isMobile || mobileMenuOpen">

  <div class="nav-container flex-grow-1" *ngIf="!isMobile || mobileMenuOpen">
    <span class="menu-label text-muted-custom small fw-bold mb-3 d-block" *ngIf="!isCollapsed || isMobile">
      MENÚ PRINCIPAL
    </span>

    <ul class="nav nav-pills flex-column mb-auto gap-1">
      <li class="nav-item" *ngFor="let item of menuItems">
        <a [routerLink]="item.route" routerLinkActive="active" 
           class="nav-link text-white d-flex align-items-center justify-content-between custom-nav-link"
           (click)="closeMobileMenu()">
          <div class="d-flex align-items-center">
            <i class="bi {{ item.icon }} icon-size"></i>
            <span class="ms-3" *ngIf="!isCollapsed || isMobile">{{ item.name }}</span>
          </div>
          <span *ngIf="item.badge != null && (!isCollapsed || isMobile)" 
                class="badge rounded-pill" 
                [ngClass]="item.badgeColor">
            {{ item.badge }}
          </span>
        </a>
      </li>
    </ul>
  </div>
</div>
