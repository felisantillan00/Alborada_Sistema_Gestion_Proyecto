spring.application.name=backend

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
# update: Crea las tablas si no existen, o las actualiza si cambias el modelo.
# Existen diferentes opciones, pero esta es la "ideal" para desarrollo. En producción, se recomienda usar "validate" o 
# manejar las migraciones con herramientas como Flyway o Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- CONFIGURACIÓN DE BASE DE DATOS (MySQL) ---
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/alborada_SistGestion?serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# --- CONFIGURACIÓN DE SERVLET ---
server.port=${PORT:8080}
server.servlet.context-path=/api
