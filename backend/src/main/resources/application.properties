spring.application.name=backend

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
# update: Crea las tablas si no existen, o las actualiza si cambias el modelo.
# Existen diferentes opciones, pero esta es la "ideal" para desarrollo. En producción, se recomienda usar "validate" o 
# manejar las migraciones con herramientas como Flyway o Liquibase.
jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

# Para ver las consultas SQL en la consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- CONFIGURACIÓN DE BASE DE DATOS (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/alborada_SistGestion?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN DE SERVLET ---
server:
    port: 8080
    servlet:
      context-path: /api